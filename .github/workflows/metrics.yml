name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
     # STAT 1: Achievements (Strictly matching official documentation)
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: bluestar404
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: X
          plugin_achievements_only: >-
            polyglot, stargazer, sponsor, deployer, member, maintainer, developer,
            scripter, packager, explorer, infographile, manager

      # STAT 2: Isometric
      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: bluestar404
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          # Inject CSS to change the 3D block colors (from zero activity to highest activity)
          config_style: >-
            :root {
              --color-calendar-graph-day-bg: #1a1b27;
              --color-calendar-graph-day-L1-bg: #3d59a1;
              --color-calendar-graph-day-L2-bg: #7aa2f7;
              --color-calendar-graph-day-L3-bg: #bb9af7;
              --color-calendar-graph-day-L4-bg: #ff007c;
            }
